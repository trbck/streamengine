# Redis Low-Latency Configuration Example
# Place this file in your config/ directory and start Redis with: redis-server config/redis_low_latency.conf

# Disable RDB persistence (no periodic disk saves)
save ""

# Disable AOF persistence (no append-only file)
appendonly no

# Set a high number of max clients (if needed)
maxclients 10000

# Minimize TCP backlog for fast connection acceptance
tcp-backlog 511

# Use a large network buffer for high-throughput
client-output-buffer-limit normal 0 0 0

# Use a large maxmemory if possible (tune for your hardware)
maxmemory 2gb
maxmemory-policy allkeys-lru

# Disable slowlog (or set to a low threshold)
slowlog-log-slower-than 10000

# Set a fast eviction policy (if needed)
# maxmemory-policy volatile-lru

# If running on localhost, use unix socket for lower latency (optional)
# unixsocket /tmp/redis.sock
# unixsocketperm 700

# Disable protected mode if running in a trusted environment
protected-mode no

# Minimize background I/O
no-appendfsync-on-rewrite yes

# Tune for your hardware and OS as needed 